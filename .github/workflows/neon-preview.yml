name: Neon preview branch

# PR ごとに Neon のデータベースをブランチングし、プレビュー用 DB を用意する。
# 前提（リポジトリ Secrets）:
#   NEON_API_KEY    - Neon の API キー
#   NEON_PROJECT_ID - Neon のプロジェクト ID
# また Neon 側で Neon Authorize（RLS）を有効化し、Clerk を JWT プロバイダとして
# 登録しておくこと（authenticated ロールと auth.user_id() がプロジェクト全体に用意される）。

'on':
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  create-branch:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci

      # PR 番号でブランチ名を決め、Neon の本番（main）からブランチを作成する。
      - name: Create Neon branch
        id: branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          username: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}

      # スキーマ（drizzle マイグレーション）を適用し、シードデータを投入する。
      - name: Apply migrations and seed
        env:
          DATABASE_URL: ${{ steps.branch.outputs.db_url }}
          SEED_USER_ID: ${{ vars.SEED_USER_ID }}
        run: |
          npm run db:migrate
          npm run db:seed

      # プレビュー DB の準備が整ったことを PR に通知する（接続文字列は出力しない）。
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- neon-preview -->';
            const body = `${marker}\n🌱 Neon プレビュー DB ブランチ \`preview/pr-${{ github.event.number }}\` を作成し、マイグレーションとシードを適用しました。\n\nVercel のプレビューには、このブランチの \`authenticated\` ロール接続文字列を \`DATABASE_AUTHENTICATED_URL\` として設定してください（Neon の Vercel インテグレーション利用時は自動連携されます）。`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  delete-branch:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
