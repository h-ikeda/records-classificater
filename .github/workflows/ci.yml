name: CI

'on':
  push:
    branches: [main]
  pull_request:

# 最小権限（CI はチェックアウトと読み取りのみ）
permissions:
  contents: read

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Verify Drizzle migrations are in sync with the schema
        run: npx drizzle-kit check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # Firestore エミュレータ（移行テスト）の実行に Java が必要
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - run: npm ci
      # 移行テスト（Firestore エミュレータ → pglite）と RLS テスト（pglite）
      - name: Run tests
        run: npm test
