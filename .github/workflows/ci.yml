name: CI

'on':
  push:
    branches: [main]
  pull_request:

# 最小権限（CI はチェックアウトと読み取りのみ）
permissions:
  contents: read

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Verify Drizzle migrations are in sync with the schema
        run: npx drizzle-kit check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
      # Firestore エミュレータ（移行テスト）の実行に Java が必要
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '21'
          distribution: temurin
      - run: npm ci
      # 移行テスト（Firestore エミュレータ → pglite）と RLS テスト（pglite）
      - name: Run tests
        run: npm test
